name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run of the network-marked integration tests, so we notice when
    # arctic-shift changes shape even with no commits landing.
    - cron: "17 6 * * 1"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy redlens
      - run: pytest -m "not integration"

  # Single required status check for branch protection. `needs: test` collapses
  # the 9-way matrix into one pass/fail, so the required check stays valid as the
  # matrix grows. integration is schedule-only, so it is intentionally excluded.
  ci-gate:
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test matrix did not pass (result=${{ needs.test.result }})"
            exit 1
          fi

  integration:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -m integration
