[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "redditpages"
version = "0.1.0"
description = "Reddit profile analytics on arctic-shift"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "platformdirs>=4",
    "sqlmodel>=0.0.14",
]

[project.optional-dependencies]
dev = ["pytest>=7", "ruff>=0.4", "mypy>=1.8"]

[project.scripts]
redditpages = "redditpages.cli:main"

[tool.setuptools.packages.find]
include = ["redditpages*"]
exclude = ["tests*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: hits the network — run with `pytest -m integration` or all with `pytest`",
]
